name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    # ONLY trigger if changes happen in the frontend folder
    paths:
      - 'frontend/**' 
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Inject Environment Variables
        run: |
          echo "VITE_AUTH_API=http://13.239.20.254:3001/api/auth" >> ./frontend/.env
          echo "VITE_ORDER_API=http://51.20.1.145:3003/api/orders" >> ./frontend/.env
          echo "VITE_BOOK_API=http://13.232.85.230:3000/health" >> ./frontend/.env
          echo "VITE_NOTIFICATION_API=http://51.20.1.145:3004/api/notifications" >> ./frontend/.env
          
      - name: Build and Push Docker Image
        # Tells Docker to build specifically from the frontend folder
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/book-corner-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/book-corner-frontend:latest
