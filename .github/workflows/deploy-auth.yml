name: Auth Service CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/user-auth-service/**' # ONLY triggers for backend changes
  workflow_dispatch:
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        # Notice we added ./backend/user-auth-service at the end to tell Docker where the code is
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/book-corner-auth-service:latest ./backend/user-auth-service
          docker push ${{ secrets.DOCKER_USERNAME }}/book-corner-auth-service:latest
